name: Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Only one Pages deploy at a time; skip queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build runs with `contents: read` only — cannot deploy. This is the
  # compromise-containment barrier: a malicious transitive dep or build step
  # cannot reach the Pages deployment surface from here.
  build:
    name: Build web/
    runs-on: ubuntu-latest
    # `pages: read` + `id-token: write` are the minimums for `configure-pages`
    # to succeed. `configure-pages` + `upload-pages-artifact` must live in the
    # same job (per Pages-deploy doc pattern). The compromise-containment split
    # still holds: build cannot call `deploy-pages` (needs `pages: write`),
    # only deploy can.
    permissions:
      contents: read
      pages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
      - name: Setup Node.js 22
        uses: actions/setup-node@ab72c7e7eba0eaa11f8cab0f5679243900c2cac9
        with:
          node-version: '22'
          cache: npm
      - name: Install (ignore-scripts)
        run: npm ci --ignore-scripts
      - name: Build library
        run: npm run build
      - name: Build web UI
        run: npm run build:web
      - name: Verify CSP meta verbatim
        run: |
          set -euo pipefail
          expected='<meta http-equiv="Content-Security-Policy" content="default-src '\''self'\''; script-src '\''self'\''; style-src '\''self'\''; connect-src '\''self'\'' https:; img-src '\''self'\'' data:; base-uri '\''none'\''; form-action '\''none'\'';" />'
          if ! grep -F "$expected" web/dist/index.html; then
            echo "CSP meta tag in web/dist/index.html is not the expected verbatim string." >&2
            echo "Expected: $expected" >&2
            exit 1
          fi
      - name: Verify MANIFEST.sha256 present + non-empty
        run: |
          test -f web/dist/MANIFEST.sha256
          test -s web/dist/MANIFEST.sha256
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
